name: PyPi package release

on:
  workflow_dispatch:
    inputs:
      api_pypi:
        description: 'PyPI API token'
        required: true
      package_name:
        description: 'Package name'
        required: true

jobs:
  build-n-publish:
    name: Build, delete all versions, and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine requests

      - name: Delete all versions from PyPi
        env:
          PYPI_API_TOKEN: ${{ github.event.inputs.api_pypi }}
        run: |
          # Get all releases for the package
          releases=$(curl -s -u __token__:${{ env.PYPI_API_TOKEN }} \
            https://pypi.org/pypi/${{ github.event.inputs.package_name }}/json | \
            jq -r '.releases | keys | .[]')

          for version in $releases; do
            echo "Deleting version $version"
            curl -X DELETE \
              -u __token__:${{ env.PYPI_API_TOKEN }} \
              https://pypi.org/manage/project/${{ github.event.inputs.package_name }}/release/$version
          done

      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ github.event.inputs.api_pypi }}
        run: |
          python setup.py sdist bdist_wheel
          twine upload --repository pypi dist/*
