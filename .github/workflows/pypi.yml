name: PyPi package release

on:
  workflow_dispatch:
    inputs:
      api_pypi:
        description: 'PyPI API token'
        required: true
      package_name:
        description: 'Package name to delete versions from PyPI'
        required: true

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine

      - name: Delete all existing versions from PyPI
        run: |
          versions=$(curl -s -H "Authorization: token ${{ github.event.inputs.api_pypi }}" \
            https://pypi.org/pypi/${{ github.event.inputs.package_name }}/json | jq -r '.releases | keys[]')
          for version in $versions; do
            echo "Deleting version $version..."
            curl -X DELETE -H "Authorization: token ${{ github.event.inputs.api_pypi }}" \
              https://pypi.org/manage/project/${{ github.event.inputs.package_name }}/release/$version/
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ github.event.inputs.api_pypi }}
        run: |
          python setup.py sdist bdist_wheel
          twine upload --repository pypi dist/*
